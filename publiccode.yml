publiccodeYmlVersion: "0.5"

name: Skills Marketplace
url: https://github.com/developer-overheid-nl/skills-marketplace

softwareType: standalone/other

platforms:
  - linux
  - mac
  - windows

developmentStatus: development

categories:
  - collaboration
  - it-development

description:
  nl:
    shortDescription: >-
      Centrale catalogus van AI-assistant plugins voor de Nederlandse overheid
    longDescription: |
      Centrale catalogus (marketplace) van AI-assistant plugins voor de
      Nederlandse overheid. Via deze marketplace kunnen overheidsteams hun
      AI-assistant plugins publiceren en ontdekken. Bevat plugins voor onder
      andere Logius standaarden, internetstandaarden (internet.nl),
      geo-standaarden (Geonovum), de Nederlandse Richtlijn Digitale Systemen
      (NeRDS), BIO2 beveiligingsbaseline, en meer. Inclusief geautomatiseerde
      validatie, kwaliteitseisen en documentatie voor pluginontwikkelaars.
    features:
      - Centrale catalogus van AI-assistant plugins voor de Nederlandse overheid
      - Geautomatiseerde validatie van plugin-registraties
      - Kwaliteitsdashboard voor gepubliceerde plugins
      - Handleidingen voor het bouwen en toevoegen van plugins
      - Ondersteuning voor meerdere overheidsorganisaties en standaarden
  en:
    shortDescription: >-
      Central catalog of AI-assistant plugins for the Dutch government
    longDescription: |
      Central catalog (marketplace) of AI-assistant plugins for the Dutch
      government. Through this marketplace, government teams can publish and
      discover AI-assistant plugins. Contains plugins for Logius standards,
      internet standards (internet.nl), geo-standards (Geonovum), the Dutch
      Digital Systems Guideline (NeRDS), BIO2 security baseline, and more.
      Includes automated validation, quality requirements, and documentation
      for plugin developers.
    features:
      - Central catalog of AI-assistant plugins for the Dutch government
      - Automated validation of plugin registrations
      - Quality dashboard for published plugins
      - Guides for building and adding plugins
      - Support for multiple government organizations and standards

