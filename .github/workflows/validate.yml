name: Valideer marketplace

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Valideer marketplace.json syntax
        run: python3 -c "import json; json.load(open('marketplace.json'))"

      - name: Valideer marketplace structuur
        run: |
          python3 << 'SCRIPT'
          import json, sys

          with open('marketplace.json') as f:
              data = json.load(f)

          errors = []

          # Verplichte velden
          for field in ['name', 'owner', 'plugins']:
              if field not in data:
                  errors.append(f"Verplicht veld '{field}' ontbreekt")

          if 'owner' in data and 'name' not in data['owner']:
              errors.append("Verplicht veld 'owner.name' ontbreekt")

          # Plugins validatie
          names = []
          for i, plugin in enumerate(data.get('plugins', [])):
              prefix = f"plugins[{i}]"
              if 'name' not in plugin:
                  errors.append(f"{prefix}: 'name' ontbreekt")
              else:
                  if plugin['name'] in names:
                      errors.append(f"{prefix}: dubbele plugin-naam '{plugin['name']}'")
                  names.append(plugin['name'])
              if 'source' not in plugin:
                  errors.append(f"{prefix}: 'source' ontbreekt")

          if errors:
              for e in errors:
                  print(f"FOUT: {e}")
              sys.exit(1)

          print(f"Marketplace '{data['name']}' is geldig ({len(data['plugins'])} plugins)")
          SCRIPT

      - name: Controleer platform-bestanden in sync
        run: python3 .github/scripts/generate_marketplace.py --check

      - name: Valideer Cursor marketplace structuur
        run: |
          python3 << 'SCRIPT'
          import json, sys

          with open('.cursor-plugin/marketplace.json') as f:
              data = json.load(f)

          errors = []

          for field in ['name', 'owner', 'plugins']:
              if field not in data:
                  errors.append(f"Verplicht veld '{field}' ontbreekt")

          if 'metadata' in data and 'pluginRoot' not in data.get('metadata', {}):
              errors.append("Verplicht veld 'metadata.pluginRoot' ontbreekt")

          for i, plugin in enumerate(data.get('plugins', [])):
              prefix = f"plugins[{i}]"
              if 'displayName' not in plugin:
                  errors.append(f"{prefix}: 'displayName' ontbreekt")
              if 'source' not in plugin:
                  errors.append(f"{prefix}: 'source' ontbreekt")

          if errors:
              for e in errors:
                  print(f"FOUT: {e}")
              sys.exit(1)

          print(f"Cursor marketplace is geldig ({len(data['plugins'])} plugins)")
          SCRIPT

      - name: Controleer plugin-repos bereikbaar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'SCRIPT'
          import json, subprocess, sys

          with open('marketplace.json') as f:
              data = json.load(f)

          errors = []
          for plugin in data.get('plugins', []):
              source = plugin.get('source', {})
              if isinstance(source, dict):
                  if source.get('source') == 'github':
                      repo = source.get('repo', '')
                  elif source.get('source') == 'url':
                      url = source.get('url', '')
                      if 'github.com' in url:
                          repo = url.split('github.com/')[-1].replace('.git', '')
                      else:
                          print(f"SKIP: {plugin['name']} - geen GitHub URL, handmatig controleren")
                          continue
                  else:
                      continue
              else:
                  continue

              result = subprocess.run(
                  ['gh', 'api', f'repos/{repo}', '--jq', '.full_name'],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  # Private repos zijn niet bereikbaar met de standaard GITHUB_TOKEN
                  print(f"SKIP: {plugin['name']} -> '{repo}' niet bereikbaar (mogelijk private repo)")
              else:
                  print(f"OK: {plugin['name']} -> {result.stdout.strip()}")

          if errors:
              for e in errors:
                  print(f"FOUT: {e}")
              sys.exit(1)

          print("Alle bereikbare plugin-repos gecontroleerd")
          SCRIPT

      - name: Controleer platform-bestanden aanwezig in repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'SCRIPT'
          import json, subprocess, sys

          with open('marketplace.json') as f:
              data = json.load(f)

          # Een plugin moet minstens één van deze manifest-paden hebben
          MANIFEST_PATHS = ['.plugin/plugin.json', '.claude-plugin/plugin.json', '.cursor-plugin/plugin.json']

          errors = []
          warnings = []
          for plugin in data.get('plugins', []):
              source = plugin.get('source', {})
              if isinstance(source, dict) and source.get('source') == 'github':
                  repo = source['repo']
              elif isinstance(source, dict) and source.get('source') == 'url':
                  url = source.get('url', '')
                  if 'github.com' in url:
                      repo = url.split('github.com/')[-1].replace('.git', '')
                  else:
                      continue
              else:
                  continue

              # Controleer eerst of repo bereikbaar is
              check = subprocess.run(
                  ['gh', 'api', f'repos/{repo}', '--jq', '.full_name'],
                  capture_output=True, text=True
              )
              if check.returncode != 0:
                  print(f"SKIP: {plugin['name']} -> '{repo}' niet bereikbaar (mogelijk private repo)")
                  continue

              found = []
              missing = []
              for path in MANIFEST_PATHS:
                  result = subprocess.run(
                      ['gh', 'api', f'repos/{repo}/contents/{path}', '--jq', '.name'],
                      capture_output=True, text=True
                  )
                  if result.returncode == 0:
                      found.append(path)
                  else:
                      missing.append(path)

              if not found:
                  errors.append(f"{plugin['name']}: geen manifest gevonden in {repo} (verwacht: {', '.join(MANIFEST_PATHS)})")
              elif '.plugin/plugin.json' not in found:
                  warnings.append(f"{plugin['name']}: mist .plugin/plugin.json in {repo} (heeft: {', '.join(found)})")
                  print(f"WAARSCHUWING: {plugin['name']} mist .plugin/plugin.json (source of truth), heeft: {', '.join(found)}")
              else:
                  print(f"OK: {plugin['name']} heeft {', '.join(found)}")

          if warnings:
              print(f"\n{len(warnings)} plugin(s) missen cross-platform bestanden")

          if errors:
              for e in errors:
                  print(f"FOUT: {e}")
              sys.exit(1)

          print("Alle bereikbare plugins hebben de verplichte bestanden")
          SCRIPT

      - name: Controleer vereiste bestanden
        run: |
          for f in LICENSE README.md CONTRIBUTING.md CHANGELOG.md marketplace.json .claude-plugin/marketplace.json .cursor-plugin/marketplace.json; do
            if [ ! -f "$f" ]; then
              echo "FOUT: $f ontbreekt"
              exit 1
            fi
          done
          echo "Alle vereiste bestanden aanwezig"
